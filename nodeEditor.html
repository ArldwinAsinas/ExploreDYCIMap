<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #252a36;
    --accent:    #00e5ff;
    --accent2:   #ff6b35;
    --accent3:   #7c3aed;
    --text:      #e2e8f0;
    --text-dim:  #64748b;
    --node-idle: #1e40af;
    --node-sel:  #00e5ff;
    --edge:      rgba(0,229,255,0.55);
    --radius:    8px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 2000;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-family: var(--sans); font-size: 15px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .mode-badge {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.1em;
    border: 1px solid;
    transition: all 0.25s;
  }
  .mode-badge.place  { color: #22c55e; border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
  .mode-badge.connect{ color: var(--accent2); border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.08); }

  .header-right { display: flex; align-items: center; gap: 8px; }

  .stat {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-val { color: var(--text); font-weight: 600; }

  /* ── Buttons ── */
  .btn {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 7px 16px; border-radius: var(--radius);
    border: 1px solid transparent; cursor: pointer;
    transition: all 0.18s; user-select: none;
    display: flex; align-items: center; gap: 7px;
  }
  .btn-ghost {
    background: transparent; border-color: var(--border); color: var(--text-dim);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); background: var(--surface2); }

  .btn-accent {
    background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.35); color: var(--accent);
    box-shadow: 0 0 16px rgba(0,229,255,0.08);
  }
  .btn-accent:hover { background: rgba(0,229,255,0.18); box-shadow: 0 0 24px rgba(0,229,255,0.2); }

  .btn-danger {
    background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: #ef4444;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.16); }

  .btn-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .btn-ghost.grid-active {
    border-color: rgba(0,229,255,0.4); color: var(--accent);
    background: rgba(0,229,255,0.07);
  }
  .btn-ghost.grid-off {
    border-color: var(--border); color: var(--text-dim);
    background: transparent;
  }

  #grid-size {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 5px 8px; border-radius: var(--radius);
    cursor: pointer; outline: none;
  }
  #grid-size:focus { border-color: var(--accent); color: var(--text); }

  /* ── Main area ── */
  #main { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* ── Map ── */
  #map {
    flex: 1;
    background: #080b12;
    cursor: crosshair !important;
  }

  /* Grid texture on map */
  #map::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #080b12 !important; cursor: crosshair !important; }
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom { border: none !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    font-size: 16px !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--accent) !important; }
  .leaflet-control-zoom-in { border-radius: 6px 6px 0 0 !important; }
  .leaflet-control-zoom-out{ border-radius: 0 0 6px 6px !important; }

  /* ── Side panel ── */
  #panel {
    width: 260px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-label {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); margin-bottom: 10px;
  }

  /* ── Node list ── */
  #node-list {
    flex: 1; overflow-y: auto;
    padding: 8px;
  }
  #node-list::-webkit-scrollbar { width: 4px; }
  #node-list::-webkit-scrollbar-track { background: transparent; }
  #node-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .node-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    border: 1px solid transparent; margin-bottom: 3px;
  }
  .node-item:hover { background: var(--surface2); border-color: var(--border); }
  .node-item.selected { background: rgba(0,229,255,0.07); border-color: rgba(0,229,255,0.3); }

  .node-item-id {
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    color: var(--accent);
  }
  .node-item-coords {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  }
  .node-item-edges {
    font-family: var(--mono); font-size: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 1px 6px; border-radius: 10px;
  }
  .node-item.selected .node-item-id { color: var(--accent); }

  .node-item-delete {
    background: none; border: none; color: var(--text-dim);
    font-size: 14px; cursor: pointer; padding: 2px 5px;
    border-radius: 4px; transition: all 0.15s; line-height: 1;
    opacity: 0;
  }
  .node-item:hover .node-item-delete { opacity: 1; }
  .node-item-delete:hover { background: rgba(239,68,68,0.15); color: #ef4444; }

  /* ── CSV Output ── */
  #csv-output {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    font-family: var(--mono); font-size: 11px; color: #94a3b8;
    line-height: 1.6; white-space: pre;
    max-height: 160px; overflow-y: auto;
    tab-size: 2;
  }
  #csv-output::-webkit-scrollbar { width: 3px; }
  #csv-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Status bar ── */
  #statusbar {
    height: 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 20px;
    flex-shrink: 0;
    z-index: 2000;
    position: relative;
  }
  .status-item {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }
  #status-msg { color: var(--accent2); font-size: 10px; font-family: var(--mono); margin-left: auto; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%) translateY(16px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 9999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Node tooltip */
  .leaflet-tooltip {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    color: var(--accent) !important;
    font-family: var(--mono) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    border-radius: 5px !important;
    padding: 3px 8px !important;
  }
  .leaflet-tooltip::before { display: none !important; }

  /* empty state */
  #empty-state {
    text-align: center; padding: 32px 16px;
    color: var(--text-dim); font-size: 12px;
    font-family: var(--mono);
    line-height: 1.8;
    border: 1px dashed var(--border);
    border-radius: 8px; margin: 8px;
  }
  #empty-state span { display: block; font-size: 24px; margin-bottom: 8px; }

  /* grid coordinate labels */
  .grid-label {
    background: transparent; border: none; pointer-events: none;
  }
  .grid-label span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: rgba(0,229,255,0.45);
    white-space: nowrap; user-select: none;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-dot"></div>
        NodeEdit
      </div>
      <div class="mode-badge place" id="mode-badge">● Place Mode</div>
    </div>
    <div class="header-right">
      <div class="stat">Nodes <span class="stat-val" id="stat-nodes">0</span></div>
      <div class="stat">Edges <span class="stat-val" id="stat-edges">0</span></div>
      <div class="btn-sep"></div>
      <button class="btn btn-ghost" id="btn-undo" title="Undo last action">↩ Undo</button>
      <button class="btn btn-ghost" id="btn-clear">⬜ Clear All</button>
      <div class="btn-sep"></div>
      <button class="btn btn-ghost grid-active" id="btn-grid" title="Toggle grid (G)">⊞ Grid</button>
      <span id="grid-info" style="font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:0 4px;">auto</span>
      <div class="btn-sep"></div>
      <button class="btn btn-accent" id="btn-export">⬇ Export CSV</button>
    </div>
  </header>

  <!-- MAIN -->
  <div id="main">
    <div id="map"></div>

    <!-- SIDE PANEL -->
    <aside id="panel">
      <div class="panel-section">
        <div class="panel-label">Nodes</div>
        <div id="node-list"></div>
      </div>
      <div class="panel-section" style="flex-shrink:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div class="panel-label" style="margin:0;">CSV Preview</div>
          <button class="btn btn-accent" id="btn-copy" style="padding:4px 10px;font-size:10px;">Copy</button>
        </div>
        <div id="csv-output">— click Export CSV to preview —</div>
      </div>
    </aside>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div class="status-item"><div class="status-dot"></div> Ready</div>
    <div class="status-item" id="coord-display">x: — &nbsp; y: —</div>
    <div id="status-msg"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
const State = (() => {
  let _nodes  = [];      // [{ id, x, y }]
  let _edges  = {};      // { nodeId: Set<nodeId> }
  let _sel    = null;    // selected node id
  let _history= [];      // undo stack (snapshots)

  function snapshot() {
    _history.push({
      nodes: JSON.parse(JSON.stringify(_nodes)),
      edges: JSON.parse(JSON.stringify(Object.fromEntries(
        Object.entries(_edges).map(([k,v]) => [k, [...v]])
      ))),
    });
    if (_history.length > 50) _history.shift();
  }

  let _counter = 0;
  function nextId() { return 'N' + (++_counter); }

  return {
    get nodes()  { return _nodes; },
    get edges()  { return _edges; },
    get selected(){ return _sel; },

    addNode(x, y) {
      snapshot();
      const id = nextId();
      _nodes.push({ id, x: Math.round(x), y: Math.round(y) });
      _edges[id] = new Set();
      return id;
    },

    removeNode(id) {
      snapshot();
      _nodes = _nodes.filter(n => n.id !== id);
      delete _edges[id];
      Object.values(_edges).forEach(s => s.delete(id));
      if (_sel === id) _sel = null;
    },

    connect(a, b) {
      if (a === b) return false;
      if (_edges[a]?.has(b)) return false; // duplicate
      snapshot();
      _edges[a] = _edges[a] || new Set();
      _edges[b] = _edges[b] || new Set();
      _edges[a].add(b);
      _edges[b].add(a);
      return true;
    },

    select(id)    { _sel = id; },
    deselect()    { _sel = null; },

    getNode(id)   { return _nodes.find(n => n.id === id) || null; },

    // Returns IDs of the `count` closest nodes to the given node (excluding itself)
    getNearestNodes(id, count = 2) {
      const src = _nodes.find(n => n.id === id);
      if (!src) return [];
      return _nodes
        .filter(n => n.id !== id)
        .map(n => ({
          id: n.id,
          dist: Math.hypot(n.x - src.x, n.y - src.y)
        }))
        .sort((a, b) => a.dist - b.dist)
        .slice(0, count)
        .map(n => n.id);
    },

    edgeCount() {
      let c = 0;
      Object.values(_edges).forEach(s => c += s.size);
      return c / 2; // bidirectional, each counted once
    },

    undo() {
      if (!_history.length) return false;
      const prev = _history.pop();
      _nodes = prev.nodes;
      _edges = Object.fromEntries(
        Object.entries(prev.edges).map(([k,v]) => [k, new Set(v)])
      );
      _sel = null;
      return true;
    },

    clear() {
      snapshot();
      _nodes = []; _edges = {}; _sel = null; _counter = 0;
    },

    exportCSV() {
      const rows = ['id,x,y,connections'];
      _nodes.forEach(n => {
        const conns = [...(_edges[n.id] || [])].join(';');
        rows.push(`${n.id},${n.x},${n.y},${conns}`);
      });
      return rows.join('\n');
    }
  };
})();

/* ════════════════════════════════════════════════════════════
   MAP SETUP
════════════════════════════════════════════════════════════ */
// ── Adjust BOUNDS to match your image dimensions ──────────
// Format: [[0, 0], [imageHeight, imageWidth]]
// For elida-map.svg (1080×1920): [[0,0],[1080,1920]]
const BOUNDS = [[0, 0], [1080, 1920]];

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -3,
  maxZoom: 4,
  zoomSnap: 0.25,
  zoomDelta: 0.5,
});

// ── Image overlay ─────────────────────────────────────────
// Replace the path below with your actual map image
L.imageOverlay('static/images/elida-map.svg', BOUNDS).addTo(map);

map.fitBounds(BOUNDS);

// !! maxBounds MUST be larger than BOUNDS — add padding on all sides
// If maxBounds < BOUNDS, Leaflet clips the view and the image disappears
map.setMaxBounds([[-120, -120], [1200, 2040]]);

/* ════════════════════════════════════════════════════════════
   MAP LAYERS
════════════════════════════════════════════════════════════ */
const layerGrid   = L.layerGroup().addTo(map);
const layerEdges  = L.layerGroup().addTo(map);
const layerNodes  = L.layerGroup().addTo(map);

/* ════════════════════════════════════════════════════════════
   GRID SYSTEM — auto-scaling
   Target: grid lines ~40–80px apart on screen at any zoom.
   Uses a "nice step" sequence: 1,2,5,10,20,50,100,200,500…
   so the grid always snaps to round world-coordinate numbers.
════════════════════════════════════════════════════════════ */
let gridEnabled = true;
let GRID_SIZE = 40; // world-units between minor lines; recalculated on every redraw

// Pick the smallest "nice" step (1·10^n, 2·10^n, 5·10^n) whose screen width
// is at least minPx pixels. Works for sub-1 world-unit steps too.
function calcGridStep(minPx = 28) {
  const scale     = Math.pow(2, map.getZoom()); // screen-px per world-unit at this zoom
  const worldNeed = minPx / scale;              // minimum world-units between lines

  // Handle worldNeed < 1 (very zoomed in): allow fractional steps like 0.5, 0.2, 0.1
  if (worldNeed <= 0) return 1;

  const mag = Math.pow(10, Math.floor(Math.log10(worldNeed)));
  for (const m of [1, 2, 5, 10]) {
    if (mag * m >= worldNeed - 1e-9) return mag * m;
  }
  return mag * 10;
}

function snapToGrid(val) {
  // Use toPrecision to avoid floating-point drift at small steps
  return parseFloat((Math.round(val / GRID_SIZE) * GRID_SIZE).toPrecision(10));
}

function drawGrid() {
  layerGrid.clearLayers();
  if (!gridEnabled) return;

  GRID_SIZE = calcGridStep(28);       // minor lines: at least 28px apart on screen
  const major = GRID_SIZE * 5;       // major line every 5 minor steps

  const bounds = map.getBounds();
  // Expand slightly so lines reach the very edge even after rounding
  const minX = Math.floor(bounds.getWest()  / GRID_SIZE - 1) * GRID_SIZE;
  const maxX = Math.ceil (bounds.getEast()  / GRID_SIZE + 1) * GRID_SIZE;
  const minY = Math.floor(bounds.getSouth() / GRID_SIZE - 1) * GRID_SIZE;
  const maxY = Math.ceil (bounds.getNorth() / GRID_SIZE + 1) * GRID_SIZE;

  // Safety: never draw more than 300 lines per axis (protects against float issues)
  const stepsX = Math.round((maxX - minX) / GRID_SIZE);
  const stepsY = Math.round((maxY - minY) / GRID_SIZE);
  if (stepsX > 300 || stepsY > 300) return;

  const minor = { color: 'rgba(0,229,255,0.09)', weight: 0.4, interactive: false };
  const maj   = { color: 'rgba(0,229,255,0.30)', weight: 0.8, interactive: false };

  const isNearMultiple = (val, step) => Math.abs(val % step) < step * 0.01 ||
                                        Math.abs(val % step - step) < step * 0.01;

  // Vertical lines (constant x)
  for (let i = 0; i <= stepsX; i++) {
    const x = minX + i * GRID_SIZE;
    const isMaj = isNearMultiple(x, major);
    L.polyline([[minY, x], [maxY, x]], isMaj ? maj : minor).addTo(layerGrid);
    if (isMaj && x >= 0 && x <= BOUNDS[1][1]) {
      L.marker([Math.max(minY, 0), x], {
        icon: L.divIcon({
          className: 'grid-label',
          html: `<span>${+x.toFixed(4)}</span>`,
          iconAnchor: [-3, 12],
        }),
        interactive: false,
      }).addTo(layerGrid);
    }
  }

  // Horizontal lines (constant y)
  for (let i = 0; i <= stepsY; i++) {
    const y = minY + i * GRID_SIZE;
    const isMaj = isNearMultiple(y, major);
    L.polyline([[y, minX], [y, maxX]], isMaj ? maj : minor).addTo(layerGrid);
    if (isMaj && y >= 0 && y <= BOUNDS[1][0]) {
      L.marker([y, Math.max(minX, 0)], {
        icon: L.divIcon({
          className: 'grid-label',
          html: `<span>${+y.toFixed(4)}</span>`,
          iconAnchor: [-3, -2],
        }),
        interactive: false,
      }).addTo(layerGrid);
    }
  }

  // Update header label — show step nicely (e.g. "1u", "0.5u", "10u")
  const info = document.getElementById('grid-info');
  if (info) {
    const label = GRID_SIZE >= 1 ? `${Math.round(GRID_SIZE)}u` : `${+GRID_SIZE.toFixed(3)}u`;
    info.textContent = label;
  }
}

// Snap preview crosshair — dashed circle that follows cursor snapped to grid
let _snapMarker = null;
function updateSnapPreview(latlng) {
  if (!gridEnabled) { removeSnapPreview(); return; }
  const sx = snapToGrid(latlng.lng);
  const sy = snapToGrid(latlng.lat);
  if (!_snapMarker) {
    _snapMarker = L.circleMarker([sy, sx], {
      radius: 7, color: '#00e5ff', fillColor: '#00e5ff',
      fillOpacity: 0.22, weight: 1.5, dashArray: '3 2',
      interactive: false,
    }).addTo(map);
  } else {
    _snapMarker.setLatLng([sy, sx]);
  }
}
function removeSnapPreview() {
  if (_snapMarker) { map.removeLayer(_snapMarker); _snapMarker = null; }
}

map.on('zoomend moveend', drawGrid);
drawGrid();

/* ════════════════════════════════════════════════════════════
   NODE RENDERING
════════════════════════════════════════════════════════════ */
const markerMap  = {};  // nodeId → L.circleMarker
const edgeMap    = {};  // "A-B" → L.polyline

function nodeStyle(id) {
  const isSel = id === State.selected;
  return {
    radius:       isSel ? 11 : 8,
    color:        isSel ? '#00e5ff' : '#3b82f6',
    fillColor:    isSel ? '#00e5ff' : '#1e3a8a',
    fillOpacity:  isSel ? 0.95 : 0.85,
    weight:       isSel ? 3 : 2,
    className:    'node-circle',
  };
}

function createNodeMarker(nodeId) {
  const node = State.getNode(nodeId);
  if (!node) return;

  const marker = L.circleMarker([node.y, node.x], nodeStyle(nodeId))
    .addTo(layerNodes)
    .bindTooltip(nodeId, { permanent: true, direction: 'top', offset: [0, -10] });

  marker.on('click', e => {
    L.DomEvent.stopPropagation(e);
    handleNodeClick(nodeId);
  });
  marker.on('contextmenu', e => {
    L.DomEvent.stopPropagation(e);
    deleteNode(nodeId);
  });

  markerMap[nodeId] = marker;
}

function refreshNodeStyle(nodeId) {
  const m = markerMap[nodeId];
  if (m) m.setStyle(nodeStyle(nodeId));
  if (m) {
    const r = nodeStyle(nodeId).radius;
    m.setRadius(r);
  }
}

function edgeKey(a, b) { return [a,b].sort().join('-'); }

function drawEdge(a, b) {
  const key = edgeKey(a, b);
  if (edgeMap[key]) return;
  const na = State.getNode(a), nb = State.getNode(b);
  if (!na || !nb) return;

  const line = L.polyline([[na.y, na.x],[nb.y, nb.x]], {
    color: 'rgba(0,229,255,0.55)',
    weight: 2.5,
    dashArray: '6 4',
    interactive: false,
  }).addTo(layerEdges);

  // Animate dash
  setTimeout(() => {
    const el = line.getElement();
    if (el) {
      el.style.animation = 'none';
      el.style.strokeDashoffset = '0';
    }
  }, 0);

  edgeMap[key] = line;
}

function removeEdgesForNode(nodeId) {
  Object.keys(edgeMap).forEach(key => {
    if (key.split('-').includes(nodeId)) {
      layerEdges.removeLayer(edgeMap[key]);
      delete edgeMap[key];
    }
  });
}

function deleteNode(nodeId) {
  removeEdgesForNode(nodeId);
  if (markerMap[nodeId]) {
    layerNodes.removeLayer(markerMap[nodeId]);
    delete markerMap[nodeId];
  }
  State.removeNode(nodeId);
  renderAll();
  toast(`Deleted ${nodeId}`);
}

/* ════════════════════════════════════════════════════════════
   INTERACTION LOGIC
════════════════════════════════════════════════════════════ */
function handleNodeClick(clickedId) {
  const sel = State.selected;

  if (!sel) {
    // SELECT this node
    State.select(clickedId);
    refreshNodeStyle(clickedId);
    setMode('connect');
    setStatus(`Selected ${clickedId} — click another node to connect`);
    refreshPanel();
    return;
  }

  if (sel === clickedId) {
    // DESELECT
    State.deselect();
    refreshNodeStyle(clickedId);
    setMode('place');
    setStatus('');
    refreshPanel();
    return;
  }

  // CONNECT sel → clickedId
  const connected = State.connect(sel, clickedId);
  if (connected) {
    drawEdge(sel, clickedId);
    toast(`Connected ${sel} ↔ ${clickedId}`);
  } else {
    toast(`Already connected`);
  }

  const prev = sel;
  State.deselect();
  refreshNodeStyle(prev);
  refreshNodeStyle(clickedId);
  setMode('place');
  setStatus('');
  renderAll();
}

map.on('click', e => {
  // Clicking on map (not a node) → create node OR deselect
  if (State.selected) {
    State.deselect();
    Object.keys(markerMap).forEach(id => refreshNodeStyle(id));
    setMode('place');
    setStatus('');
    refreshPanel();
    return;
  }
  const rawLat = e.latlng.lat, rawLng = e.latlng.lng;
  const lng = gridEnabled ? snapToGrid(rawLng) : Math.round(rawLng);
  const lat = gridEnabled ? snapToGrid(rawLat) : Math.round(rawLat);
  const id = State.addNode(lng, lat); // x=lng, y=lat in CRS.Simple
  createNodeMarker(id);

  // Auto-connect to the 2 nearest existing nodes
  const nearest = State.getNearestNodes(id, 2);
  nearest.forEach(otherId => {
    if (State.connect(id, otherId)) {
      drawEdge(id, otherId);
    }
  });

  renderAll();
  const connMsg = nearest.length ? ` → auto-connected to ${nearest.join(', ')}` : '';
  setStatus(`Created ${id} at (${Math.round(lng)}, ${Math.round(lat)})${connMsg}`);
  setTimeout(() => setStatus(''), 2500);
});

/* Coord display + snap preview on mousemove */
map.on('mousemove', e => {
  const rx = Math.round(e.latlng.lng), ry = Math.round(e.latlng.lat);
  const sx = gridEnabled ? snapToGrid(e.latlng.lng) : rx;
  const sy = gridEnabled ? snapToGrid(e.latlng.lat) : ry;
  const snap = gridEnabled ? ` → snap (${sx}, ${sy})` : '';
  document.getElementById('coord-display').textContent = `x: ${rx}  y: ${ry}${snap}`;
  if (!State.selected) updateSnapPreview(e.latlng);
});
map.on('mouseout', removeSnapPreview);

/* ════════════════════════════════════════════════════════════
   UI RENDERING
════════════════════════════════════════════════════════════ */
function renderAll() {
  refreshPanel();
  updateStats();
  refreshCSV();
}

function refreshPanel() {
  const list = document.getElementById('node-list');
  if (!State.nodes.length) {
    list.innerHTML = '<div id="empty-state"><span>⬡</span>No nodes yet.<br>Click the map to place nodes.</div>';
    return;
  }
  list.innerHTML = '';
  State.nodes.forEach(n => {
    const edgeCount = (State.edges[n.id]?.size || 0);
    const isSel = n.id === State.selected;
    const item = document.createElement('div');
    item.className = 'node-item' + (isSel ? ' selected' : '');
    item.innerHTML = `
      <div>
        <div class="node-item-id">${n.id}</div>
        <div class="node-item-coords">(${n.x}, ${n.y})</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="node-item-edges">${edgeCount} edge${edgeCount!==1?'s':''}</span>
        <button class="node-item-delete" title="Delete node" data-id="${n.id}">✕</button>
      </div>`;
    item.addEventListener('click', e => {
      if (e.target.classList.contains('node-item-delete')) return;
      handleNodeClick(n.id);
      map.flyTo([n.y, n.x], map.getZoom(), { animate: true, duration: 0.4 });
    });
    item.querySelector('.node-item-delete').addEventListener('click', e => {
      e.stopPropagation();
      deleteNode(n.id);
    });
    list.appendChild(item);
  });
}

function updateStats() {
  document.getElementById('stat-nodes').textContent = State.nodes.length;
  document.getElementById('stat-edges').textContent = State.edgeCount();
}

function refreshCSV() {
  if (!State.nodes.length) {
    document.getElementById('csv-output').textContent = '— click Export CSV to preview —';
    return;
  }
  document.getElementById('csv-output').textContent = State.exportCSV();
}

function setMode(mode) {
  const badge = document.getElementById('mode-badge');
  if (mode === 'connect') {
    badge.textContent = '⬡ Connect Mode';
    badge.className = 'mode-badge connect';
  } else {
    badge.textContent = '● Place Mode';
    badge.className = 'mode-badge place';
  }
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ════════════════════════════════════════════════════════════
   BUTTON EVENTS
════════════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════════════
   CSV FILE EXPORT
   Naming: nodestrial.csv → nodestrial1.csv → nodestrial2.csv …
   Counter persisted in localStorage so it survives page reloads.
════════════════════════════════════════════════════════════ */
function getExportFilename() {
  const count = parseInt(localStorage.getItem('nodestrial_export_count') || '0', 10);
  const name  = count === 0 ? 'nodestrial.csv' : `nodestrial${count}.csv`;
  localStorage.setItem('nodestrial_export_count', count + 1);
  return name;
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}

document.getElementById('btn-export').addEventListener('click', () => {
  if (!State.nodes.length) { toast('No nodes to export'); return; }
  const csv      = State.exportCSV();
  const filename = getExportFilename();
  downloadCSV(csv, filename);
  document.getElementById('csv-output').textContent = csv;
  toast(`Saved as ${filename} ✓`);
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const csv = State.exportCSV();
  navigator.clipboard?.writeText(csv).then(() => toast('Copied to clipboard ✓'))
    .catch(() => toast('Copy failed — check permissions'));
});

document.getElementById('btn-undo').addEventListener('click', () => {
  // Rebuild entire visual state from State after undo
  const ok = State.undo();
  if (!ok) { toast('Nothing to undo'); return; }

  // Clear and rebuild all markers/edges
  layerNodes.clearLayers();
  layerEdges.clearLayers();
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  Object.keys(edgeMap).forEach(k => delete edgeMap[k]);

  State.nodes.forEach(n => createNodeMarker(n.id));
  State.nodes.forEach(n => {
    (State.edges[n.id] || new Set()).forEach(otherId => {
      if (n.id < otherId) drawEdge(n.id, otherId); // draw once
    });
  });

  renderAll();
  toast('Undone ↩');
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!State.nodes.length) return;
  if (!confirm('Clear all nodes and edges?')) return;
  layerNodes.clearLayers();
  layerEdges.clearLayers();
  Object.keys(markerMap).forEach(k => delete markerMap[k]);
  Object.keys(edgeMap).forEach(k => delete edgeMap[k]);
  State.clear();
  setMode('place');
  setStatus('');
  renderAll();
  toast('Cleared');
});

/* ════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'g' || e.key === 'G') {
    document.getElementById('btn-grid').click();
    return;
  }
  if (e.key === 'Escape') {
    if (State.selected) {
      const prev = State.selected;
      State.deselect();
      refreshNodeStyle(prev);
      setMode('place');
      setStatus('');
      refreshPanel();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    document.getElementById('btn-undo').click();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
    e.preventDefault();
    document.getElementById('btn-export').click();
  }
});

/* ════════════════════════════════════════════════════════════
   GRID CONTROLS
════════════════════════════════════════════════════════════ */
document.getElementById('btn-grid').addEventListener('click', () => {
  gridEnabled = !gridEnabled;
  const btn = document.getElementById('btn-grid');
  btn.classList.toggle('grid-active', gridEnabled);
  btn.classList.toggle('grid-off', !gridEnabled);
  btn.textContent = gridEnabled ? '⊞ Grid' : '⊟ Grid';
  drawGrid();
  if (!gridEnabled) removeSnapPreview();
  drawGrid(); toast(gridEnabled ? `Grid on · ${Math.round(GRID_SIZE)}u` : 'Grid off');
});

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
renderAll();

// Add style for dash animation after Leaflet loads
const style = document.createElement('style');
style.textContent = `
  @keyframes dashAnim { to { stroke-dashoffset: -20; } }
  .leaflet-interactive[stroke-dasharray] { animation: dashAnim 1.2s linear infinite; }
`;
document.head.appendChild(style);
</script>
</body>
